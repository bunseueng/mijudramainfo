# pnpm 10+ reads overrides / build-allowlist from here (not package.json).

# Security pins — force safe versions across the whole tree (incl. transitives).
overrides:
  nodemailer: 9.0.1      # GHSA high + 3 moderate (CRLF / TLS / file-access)
  postcss: 8.5.15        # ReDoS, fixed >=8.5.10
  uuid: 14.0.0           # advisory, fixed >=11.1.1
  js-yaml: 4.2.0         # DoS, fixed >=4.1.2
  markdown-it: 14.2.0    # quadratic DoS, fixed >=14.1.2
  # keep React types aligned with React 19
  '@types/react': 19.0.7
  '@types/react-dom': 19.0.3

# Native/postinstall scripts allowed to run (pnpm blocks all by default).
onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
  - bcrypt
  - sharp
  - core-js
  - unrs-resolver
  - '@vercel/speed-insights'

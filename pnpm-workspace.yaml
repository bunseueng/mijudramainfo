# pnpm 11 reads these settings here (NOT package.json's "pnpm" field).

# Security pins — force safe versions across the whole tree (incl. transitives).
overrides:
  nodemailer: 9.0.1 # GHSA high + 3 moderate (CRLF / TLS / file-access)
  postcss: 8.5.15 # ReDoS, fixed >=8.5.10
  uuid: 14.0.0 # advisory, fixed >=11.1.1
  js-yaml: 4.2.0 # DoS, fixed >=4.1.2
  markdown-it: 14.2.0 # quadratic DoS, fixed >=14.1.2
  # keep React types aligned with React 19
  '@types/react': 19.0.7
  '@types/react-dom': 19.0.3

# Native/postinstall scripts allowed to run on CI. pnpm 11 blocks all build
# scripts by default and FAILS `install --frozen-lockfile` until they are
# approved here. This `allowBuilds` map is what pnpm 11 honors (the older
# `onlyBuiltDependencies` list is ignored under frozen installs).
# Generated by `pnpm approve-builds --all`.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  bcrypt: true
  sharp: true
  core-js: true
  unrs-resolver: true
